version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: staylo_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: staylo_db
    ports:
      - "3306:3306"
    volumes:
      - staylo_mysql_data:/var/lib/mysql
    networks:
      - staylo_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  app:
    build: .
    container_name: staylo_app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/staylo_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - staylo_network

volumes:
  staylo_mysql_data:

networks:
  staylo_network:
    driver: bridge
