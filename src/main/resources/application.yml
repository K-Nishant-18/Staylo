spring:
  datasource:
    url: jdbc:mysql://localhost:3306/staylo_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: Opendear@123
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  sql:
    init:
      mode: always
      data-locations: classpath:data.sql

server:
  port: 8080

# JWT Configuration
jwt:
  secret: staylo-super-secret-key-for-jwt-authentication-2024-must-be-at-least-256-bits
  expiration: 86400000   # 24 hours in milliseconds

# SpringDoc / Swagger UI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

logging:
  level:
    com.staylo: DEBUG
    org.springframework.security: INFO
